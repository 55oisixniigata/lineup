<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本日のラインナップ | オイシックス新潟アルビレックスBC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #F0F2F5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .header {
      background: #015095;
      color: white;
      padding: 24px 16px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* マスコットキャラクター */
    .header-mascot {
      position: absolute;
      bottom: 0;
      width: 88px;
      pointer-events: none;
      z-index: 0;
    }
    .header-mascot-left  { left: 0; }
    .header-mascot-right { right: 0; transform: scaleX(-1); }
    /* 右上の光彩 */
    .header::after {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(232,168,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-logo {
      width: 110px;
      height: 110px;
      object-fit: contain;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }
    .header-team {
      font-size: 10px;
      letter-spacing: 0.18em;
      opacity: 0.7;
      margin-bottom: 10px;
      text-transform: uppercase;
      position: relative;
    }
    .header-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.06em;
      position: relative;
      z-index: 1;
    }
    .header-accent {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }
    .header-accent::before,
    .header-accent::after {
      content: '';
      flex: 1;
      max-width: 48px;
      height: 1px;
      background: rgba(232,168,0,0.5);
    }
    .header-accent-diamond {
      width: 6px;
      height: 6px;
      background: #E8A800;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── 試合情報カード ── */
    .game-card {
      background: white;
      margin: 16px 16px 0;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid #E8A800;
    }
    .game-card-title {
      font-size: 10px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .game-meta {
      display: grid;
      gap: 7px;
    }
    .game-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .game-meta-icon {
      font-size: 16px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .game-meta-vs {
      font-size: 18px;
      font-weight: 800;
    }

    /* ── 待機画面 ── */
    .waiting-card {
      background: white;
      margin: 16px;
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .waiting-emoji { font-size: 52px; margin-bottom: 16px; }
    .waiting-title { font-size: 18px; font-weight: 800; color: #0B2363; margin-bottom: 10px; }
    .waiting-sub   { font-size: 14px; color: #888; line-height: 1.7; }

    /* ── セクション ── */
    .section { margin: 16px 16px 0; }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #0B2363;
      letter-spacing: 0.08em;
      padding: 0 2px 8px;
      border-bottom: 2px solid #0B2363;
      margin-bottom: 10px;
    }

    /* ── Case B スタメンカード ── */
    .player-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      overflow: hidden;
      display: flex;
      align-items: stretch;
      min-height: 108px;
    }
    .player-card.is-pitcher {
      border: 2px dashed #E8A800;
      margin-top: 6px;
    }

    /* 背番号バンド */
    .player-num-band {
      background: #0B2363;
      width: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
    }
    .player-card.is-pitcher .player-num-band {
      background: #4a3a00;
    }
    .player-num-text {
      color: #E8A800;
      font-size: 15px;
      font-weight: 900;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* 顔写真 */
    .player-photo-wrap {
      width: 82px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: #ffffff;
    }
    .player-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .player-photo-placeholder {
      width: 100%;
      min-height: 108px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 800;
      color: #0B2363;
      opacity: 0.35;
      background: #E0E4F0;
    }

    /* 右側コンテンツ */
    .player-card-body {
      flex: 1;
      padding: 10px 12px 10px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      min-width: 0;
    }
    .player-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 1px;
    }
    .player-position-badge {
      background: #0B2363;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .player-number {
      font-size: 11px;
      color: #aaa;
    }
    .player-bio {
      font-size: 11.5px;
      color: #555;
      line-height: 1.55;
      margin-top: 4px;
    }
    .btn-row {
      display: flex;
      flex-direction: row;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tb-btn, .profile-btn {
      display: inline-block;
      background: #015095;
      color: white;
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 5px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .tb-btn:hover, .profile-btn:hover { opacity: 0.85; }

    /* ── その他出場選手 ── */
    .bench-card {
      background: white;
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bench-dot { width: 6px; height: 6px; background: #ccc; border-radius: 50%; flex-shrink: 0; }
    .bench-position { font-size: 11px; color: #666; width: 32px; flex-shrink: 0; }
    .bench-name { flex: 1; font-size: 15px; font-weight: 600; }
    .bench-number { font-size: 11px; color: #aaa; font-weight: 400; }

    /* ── TalentBook 説明 ── */
    .tb-note {
      margin: 16px 16px;
      background: #EEF0FF;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }
    .tb-note strong { color: #5B5BD6; }

    /* ── フッター ── */
    .footer { text-align: center; padding: 20px 16px 32px; font-size: 11px; color: #aaa; }

    /* ── ローディング / エラー ── */
    .status-msg { text-align: center; padding: 40px 20px; color: #888; font-size: 14px; }
    .error-msg {
      margin: 16px;
      background: #fff3f3;
      border: 1px solid #fcc;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: #c00;
      line-height: 1.6;
    }
  </style>
</head>

// ── CSV パーサー ────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const cells = [];
    let inQuote = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cell += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cells.push(cell.trim()); cell = '';
      } else {
        cell += ch;
      }
    }
    cells.push(cell.trim());
    rows.push(cells);
  }
  return rows;
}

// ── データ解析 ───────────────────────────────────────────────
function parseData(rows) {
  let lineupHeaderRow = -1;
  for (let i = 0; i < rows.length; i++) {
    if ((rows[i][0] || '').trim() === '打順') { lineupHeaderRow = i; break; }
  }

  const gameInfo = {};
  for (let i = 0; i < (lineupHeaderRow < 0 ? rows.length : lineupHeaderRow); i++) {
    const row = rows[i];
    const key = (row[0] || '').trim();
    if (!key) continue;
    const value = row.slice(1).map(c => c.trim()).find(c => c) || '';
    gameInfo[key] = value;
  }

  const players = [];
  if (lineupHeaderRow >= 0) {
    for (let i = lineupHeaderRow + 1; i < rows.length; i++) {
      const row = rows[i];
      const order = (row[0] || '').trim();
      const name  = (row[4] || '').trim(); // E列：氏名
      if (!name || name.startsWith('#')) continue;
      players.push({
        order,
        pos:     posName((row[2] || '').trim()), // C列：守備位置名（日本語）
        number:  (row[3] || '').trim(),           // D列：背番号
        name,                                      // E列：氏名（row[4]）
        starter: /^\d+$/.test(order) || order === 'P',
        pitcher: order === 'P',
        tbUrl:   (row[5] || '').trim().startsWith('http') ? (row[5] || '').trim() : '' // F列
      });
    }
  }

  return { gameInfo, players };
}

// ── 今日かどうか判定 ─────────────────────────────────────────
function isToday(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) {
    return parseInt(m[1]) === today.getFullYear() &&
           parseInt(m[2]) === today.getMonth() + 1 &&
           parseInt(m[3]) === today.getDate();
  }
  const d = new Date(dateStr);
  if (!isNaN(d)) {
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth()    === today.getMonth() &&
           d.getDate()     === today.getDate();
  }
  return false;
}

// ── 時刻フォーマット ─────────────────────────────────────────
function formatTime(val) {
  if (!val) return '';
  if (/^\d{1,2}:\d{2}$/.test(val)) return val;
  const d = new Date(val);
  if (!isNaN(d)) {
    return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
  }
  const num = parseFloat(val);
  if (!isNaN(num) && num > 0 && num < 1) {
    const totalMin = Math.round(num * 24 * 60);
    return `${Math.floor(totalMin / 60)}:${(totalMin % 60).toString().padStart(2, '0')}`;
  }
  return val;
}

// ── 日付フォーマット ─────────────────────────────────────────
function formatDate(str) {
  if (/\d{4}年\d{1,2}月\d{1,2}日/.test(str)) return str;
  const d = new Date(str.replace(/\//g, '-'));
  if (isNaN(d)) return str;
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

// ── 試合カードHTML（共通） ────────────────────────────────────
function gameCardHtml(gameInfo) {
  const opponent  = gameInfo['対戦相手'] || '—';
  const teamColor = TEAM_COLORS[opponent] || '#0B2363';
  const gameDate  = gameInfo['日付'] ? formatDate(gameInfo['日付']) : '—';
  const venue     = gameInfo['球場'] || '';
  const gameTime  = formatTime(gameInfo['試合開始'] || '');
  const venueRow  = venue    ? `<div class="game-meta-row"><span class="game-meta-icon">🏟️</span>${venue}</div>` : '';
  const timeRow   = gameTime ? `<div class="game-meta-row"><span class="game-meta-icon">⏰</span>${gameTime} 試合開始</div>` : '';
  return `
    <div class="game-card">
      <div class="game-card-title">TODAY'S GAME</div>
      <div class="game-meta">
        <div class="game-meta-row"><span class="game-meta-icon">📅</span>${gameDate}</div>
        <div class="game-meta-row"><span class="game-meta-icon">⚾</span><span class="game-meta-vs" style="color:${teamColor}">VS ${opponent}</span></div>
        ${venueRow}
        ${timeRow}
      </div>
    </div>
  `;
}

// ── 試合開始15分前を過ぎているか ─────────────────────────────
function isTimeToShowLineup(rawTimeVal) {
  if (!rawTimeVal) return true; // 時刻未設定なら即表示
  const timeStr = formatTime(rawTimeVal);
  if (!timeStr || !timeStr.includes(':')) return true;
  const [h, m] = timeStr.split(':').map(Number);
  const now = new Date();
  const gameStart = new Date(now);
  gameStart.setHours(h, m, 0, 0);
  const showTime = new Date(gameStart.getTime() - 15 * 60 * 1000); // 15分前
  return now >= showTime;
}

// ── 待機画面（試合なし or 当日でない） ───────────────────────
function renderWaiting() {
  document.getElementById('app').innerHTML = `
    <div class="waiting-card">
      <div class="waiting-emoji">⚾</div>
      <div class="waiting-title">本日の試合情報はありません</div>
      <div class="waiting-sub">試合日にまたアクセスしてみてください！</div>
    </div>
  `;
}

// ── 試合情報は表示 ＋ スタメン待機 ───────────────────────────
function renderGameWithWaiting(gameInfo) {
  const rawTime = gameInfo['試合開始'] || '';
  const timeStr = formatTime(rawTime);
  let announceNote = '';
  if (timeStr && timeStr.includes(':')) {
    const [h, m] = timeStr.split(':').map(Number);
    const gameStart = new Date();
    gameStart.setHours(h, m, 0, 0);
    const showAt = new Date(gameStart.getTime() - 15 * 60 * 1000);
    const sh = showAt.getHours();
    const sm = showAt.getMinutes().toString().padStart(2, '0');
    announceNote = `<br><span style="color:#aaa;font-size:0.85em">${sh}:${sm} 頃発表予定</span>`;
  }
  document.getElementById('app').innerHTML = `
    ${gameCardHtml(gameInfo)}
    <div class="waiting-card" style="margin-top:16px">
      <div class="waiting-emoji">⏳</div>
      <div class="waiting-title">スタメン発表まであと少し！</div>
      <div class="waiting-sub">試合開始15分前にこのページを更新してみてね。${announceNote}</div>
    </div>
  `;
}

// ── 選手カード描画ヘルパー ───────────────────────────────────
function buildPlayerCard(p, orderLabel, isPitcher) {
  const url     = photoUrl(p.number);
  const initial = p.name.trim().slice(0, 1);
  const bio     = bioText(p.tbUrl);

  const photoHtml = url
    ? `<img class="player-photo" src="${url}" alt="${p.name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="player-photo-placeholder" style="display:none">${initial}</div>`
    : `<div class="player-photo-placeholder">${initial}</div>`;

  const tbHtml = p.tbUrl
    ? `<a class="tb-btn" href="${p.tbUrl}" target="_blank" rel="noopener">選手インタビュー ›</a>`
    : '';

  const pUrl = profileUrl(p.number);
  const profileHtml = pUrl
    ? `<a class="profile-btn" href="${pUrl}" target="_blank" rel="noopener">プロフィール ›</a>`
    : '';

  const bioHtml = bio ? `<div class="player-bio">${bio}</div>` : '';

  return `
    <div class="player-card${isPitcher ? ' is-pitcher' : ''}">
      <div class="player-num-band">
        <div class="player-num-text">${orderLabel}</div>
      </div>
      <div class="player-photo-wrap">${photoHtml}</div>
      <div class="player-card-body">
        <div class="player-name">${p.name}</div>
        <div class="player-meta">
          <span class="player-position-badge">${p.pos}</span>
          ${p.number ? `<span class="player-number">背番号 ${p.number}</span>` : ''}
        </div>
        ${bioHtml}
        ${(tbHtml || profileHtml) ? `<div class="btn-row">${profileHtml}${tbHtml}</div>` : ''}
      </div>
    </div>
  `;
}

// ── 描画 ─────────────────────────────────────────────────────
function render(gameInfo, players) {
  const starters = players.filter(p => p.starter && !p.pitcher);
  const pitcher  = players.find(p => p.pitcher);
  const bench    = players.filter(p => !p.starter);

  const starterCards = starters.map(p =>
    buildPlayerCard(p, p.order, false)
  ).join('');

  const pitcherCard = pitcher
    ? buildPlayerCard(pitcher, '投手', true)
    : '';

  const benchCards = bench.map(p => {
    const tbHtml = p.tbUrl
      ? `<a class="tb-btn" href="${p.tbUrl}" target="_blank" rel="noopener">選手インタビュー ›</a>`
      : '';
    const pUrl = profileUrl(p.number);
    const profileHtml = pUrl
      ? `<a class="profile-btn" href="${pUrl}" target="_blank" rel="noopener">プロフィール ›</a>`
      : '';
    return `
      <div class="bench-card">
        <div class="bench-dot"></div>
        <div class="bench-position">${p.pos}</div>
        <div class="bench-name">${p.name}${p.number ? `<span class="bench-number"> 背番号${p.number}</span>` : ''}</div>
        ${(tbHtml || profileHtml) ? `<div class="btn-row">${profileHtml}${tbHtml}</div>` : ''}
      </div>
    `;
  }).join('');

  const benchSection = bench.length ? `
    <div class="section">
      <div class="section-title">その他の出場選手</div>
      ${benchCards}
    </div>
  ` : '';

  document.getElementById('app').innerHTML = `
    ${gameCardHtml(gameInfo)}

    <div class="section">
      <div class="section-title">スターティングラインナップ</div>
      ${starterCards}${pitcherCard}
    </div>

    ${benchSection}
  `;
}

// ── メイン ───────────────────────────────────────────────────
async function main() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    const { gameInfo, players } = parseData(rows);

    const dateStr   = gameInfo['日付'] || '';
    const hasLineup = players.some(p => p.starter);

    if (!isToday(dateStr)) {
      // 当日でない → 試合なし画面
      renderWaiting();
    } else if (!hasLineup || !isTimeToShowLineup(gameInfo['試合開始'])) {
      // 当日だが、スタメン未入力 or 発表15分前未満 → 試合情報＋待機
      renderGameWithWaiting(gameInfo);
    } else {
      // 当日 ＆ 発表時刻到達 → フル表示
      render(gameInfo, players);
    }
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error-msg">
        ❌ データを読み込めませんでした。<br><br>
        <small style="color:#aaa">エラー詳細: ${e.message}</small>
      </div>
    `;
  }
}

main();
