<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本日のスタメン | オイシックス新潟アルビレックスBC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #F0F2F5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .header {
      background: #0B2363;
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
    }
    .header-team {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .header-accent {
      display: inline-block;
      width: 40px;
      height: 3px;
      background: #E8A800;
      border-radius: 2px;
      margin-top: 10px;
    }

    /* ── 試合情報カード ── */
    .game-card {
      background: white;
      margin: 16px 16px 0;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid #E8A800;
    }
    .game-card-title {
      font-size: 10px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .game-meta {
      display: grid;
      gap: 7px;
    }
    .game-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .game-meta-icon {
      font-size: 16px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .game-meta-vs {
      font-size: 18px;
      font-weight: 800;
    }

    /* ── 待機画面 ── */
    .waiting-card {
      background: white;
      margin: 16px;
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .waiting-emoji {
      font-size: 52px;
      margin-bottom: 16px;
    }
    .waiting-title {
      font-size: 18px;
      font-weight: 800;
      color: #0B2363;
      margin-bottom: 10px;
    }
    .waiting-sub {
      font-size: 14px;
      color: #888;
      line-height: 1.7;
    }

    /* ── セクション ── */
    .section {
      margin: 16px 16px 0;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #0B2363;
      letter-spacing: 0.08em;
      padding: 0 2px 8px;
      border-bottom: 2px solid #0B2363;
      margin-bottom: 10px;
    }

    /* ── スタメンカード ── */
    .player-card {
      background: white;
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .player-card.is-pitcher {
      border-top: 2px dashed #E8A800;
      margin-top: 4px;
    }
    .player-order {
      font-size: 22px;
      font-weight: 900;
      color: #E8A800;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }
    .player-order.pitcher-label {
      font-size: 13px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 0;
    }
    .player-position-badge {
      background: #0B2363;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .player-info {
      flex: 1;
    }
    .player-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .player-number {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }
    .tb-btn {
      background: #5B5BD6;
      color: white;
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 6px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      display: inline-block;
      white-space: nowrap;
    }
    .tb-btn:hover { opacity: 0.85; }

    /* ── その他出場選手 ── */
    .bench-card {
      background: white;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bench-dot {
      width: 6px;
      height: 6px;
      background: #ccc;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .bench-position {
      font-size: 11px;
      color: #666;
      width: 32px;
      flex-shrink: 0;
    }
    .bench-name {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
    }
    .bench-number {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
    }

    /* ── TalentBook 説明 ── */
    .tb-note {
      margin: 16px 16px;
      background: #EEF0FF;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }
    .tb-note strong {
      color: #5B5BD6;
    }

    /* ── フッター ── */
    .footer {
      text-align: center;
      padding: 20px 16px 32px;
      font-size: 11px;
      color: #aaa;
    }

    /* ── ローディング / エラー ── */
    .status-msg {
      text-align: center;
      padding: 40px 20px;
      color: #888;
      font-size: 14px;
    }
    .error-msg {
      margin: 16px;
      background: #fff3f3;
      border: 1px solid #fcc;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: #c00;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-team">オイシックス新潟アルビレックスBC</div>
  <div class="header-title">本日のスタメン</div>
  <div class="header-accent"></div>
</div>

<div id="app">
  <div class="status-msg">読み込み中…</div>
</div>

<div class="tb-note">
  <strong>TalentBook（タレントブック）</strong>とは？<br>
  各選手のプロフィール・経歴・インタビューが読めるページです。ぜひ応援したい選手のことをもっと知ってみてください！
</div>

<div class="footer">
  <div>オイシックス新潟アルビレックスBC</div>
</div>

<script>
const CSV_URL = 'https://script.google.com/macros/s/AKfycbwMkya55qhQHBNBxsanR9JuKTjCQ3C6avHqE0YqRh0-jCZcFBTsrwuldi3zV5YT_R7e/exec';

// ── チームカラー ─────────────────────────────────────────────
const TEAM_COLORS = {
  '東北楽天ゴールデンイーグルス': '#CC0033',
  '読売ジャイアンツ':             '#F47920',
  '東京ヤクルトスワローズ':       '#007B40',
  '横浜DeNAベイスターズ':        '#004B98',
  '埼玉西武ライオンズ':           '#00358C',
  '北海道日本ハムファイターズ':   '#E60012',
  'オリックス・バファローズ':     '#1A2F6B',
  '千葉ロッテマリーンズ':         '#002B56',
  '福岡ソフトバンクホークス':     '#F7B027',
  '中日ドラゴンズ':               '#003595',
  '阪神タイガース':               '#FFE000',
  '広島東洋カープ':               '#E40012',
};

// ── CSV パーサー ────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const cells = [];
    let inQuote = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cell += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cells.push(cell.trim()); cell = '';
      } else {
        cell += ch;
      }
    }
    cells.push(cell.trim());
    rows.push(cells);
  }
  return rows;
}

// ── データ解析 ───────────────────────────────────────────────
function parseData(rows) {
  let lineupHeaderRow = -1;
  for (let i = 0; i < rows.length; i++) {
    if ((rows[i][0] || '').trim() === '打順') { lineupHeaderRow = i; break; }
  }

  const gameInfo = {};
  for (let i = 0; i < (lineupHeaderRow < 0 ? rows.length : lineupHeaderRow); i++) {
    const row = rows[i];
    const key = (row[0] || '').trim();
    if (!key) continue;
    const value = row.slice(1).map(c => c.trim()).find(c => c) || '';
    gameInfo[key] = value;
  }

  const players = [];
  if (lineupHeaderRow >= 0) {
    for (let i = lineupHeaderRow + 1; i < rows.length; i++) {
      const row = rows[i];
      const order = (row[0] || '').trim();
      const name  = (row[3] || '').trim();
      if (!name || name.startsWith('#')) continue;
      players.push({
        order,
        pos:     (row[1] || '').trim(),
        number:  (row[2] || '').trim(),
        name,
        starter: /^\d+$/.test(order) || order === 'P',
        pitcher: order === 'P',
        tbUrl:   (row[4] || '').trim().startsWith('http') ? (row[4] || '').trim() : ''
      });
    }
  }

  return { gameInfo, players };
}

// ── 今日かどうか判定 ─────────────────────────────────────────
function isToday(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  // "2026年6月20日（土）" 形式
  const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) {
    return parseInt(m[1]) === today.getFullYear() &&
           parseInt(m[2]) === today.getMonth() + 1 &&
           parseInt(m[3]) === today.getDate();
  }
  // Apps Scriptが日付オブジェクトを文字列化した場合
  const d = new Date(dateStr);
  if (!isNaN(d)) {
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth()    === today.getMonth() &&
           d.getDate()     === today.getDate();
  }
  return false;
}

// ── 時刻フォーマット ─────────────────────────────────────────
function formatTime(val) {
  if (!val) return '';
  // すでに "16:00" 形式
  if (/^\d{1,2}:\d{2}$/.test(val)) return val;
  // Apps Script が Date オブジェクトを文字列化した場合（"Sat Dec 30 1899 16:00:00..."）
  const d = new Date(val);
  if (!isNaN(d)) {
    return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
  }
  // Sheetsの内部表現（小数: 0.666... = 16:00）
  const num = parseFloat(val);
  if (!isNaN(num) && num > 0 && num < 1) {
    const totalMin = Math.round(num * 24 * 60);
    return `${Math.floor(totalMin / 60)}:${(totalMin % 60).toString().padStart(2, '0')}`;
  }
  return val;
}

// ── 日付フォーマット ─────────────────────────────────────────
function formatDate(str) {
  if (/\d{4}年\d{1,2}月\d{1,2}日/.test(str)) return str;
  const d = new Date(str.replace(/\//g, '-'));
  if (isNaN(d)) return str;
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

// ── 待機画面 ─────────────────────────────────────────────────
function renderWaiting() {
  document.getElementById('app').innerHTML = `
    <div class="waiting-card">
      <div class="waiting-emoji">⚾</div>
      <div class="waiting-title">スタメン発表まであと少し！</div>
      <div class="waiting-sub">楽しみに待っててね！<br>発表されたらこのページを更新してみてください。</div>
    </div>
  `;
}

// ── 描画 ─────────────────────────────────────────────────────
function render(gameInfo, players) {
  const starters = players.filter(p => p.starter && !p.pitcher);
  const pitcher  = players.find(p => p.pitcher);
  const bench    = players.filter(p => !p.starter);

  const tbLink = (p) => p.tbUrl
    ? `<a class="tb-btn" href="${p.tbUrl}" target="_blank" rel="noopener">プロフィール ›</a>`
    : '';

  const starterCards = starters.map(p => `
    <div class="player-card">
      <div class="player-order">${p.order}</div>
      <div class="player-position-badge">${p.pos}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        ${p.number ? `<div class="player-number">#${p.number}</div>` : ''}
      </div>
      ${tbLink(p)}
    </div>
  `).join('');

  const pitcherCard = pitcher ? `
    <div class="player-card is-pitcher">
      <div class="player-order pitcher-label">投手</div>
      <div class="player-position-badge">${pitcher.pos}</div>
      <div class="player-info">
        <div class="player-name">${pitcher.name}</div>
        ${pitcher.number ? `<div class="player-number">#${pitcher.number}</div>` : ''}
      </div>
      ${tbLink(pitcher)}
    </div>
  ` : '';

  const benchCards = bench.map(p => `
    <div class="bench-card">
      <div class="bench-dot"></div>
      <div class="bench-position">${p.pos}</div>
      <div class="bench-name">${p.name}${p.number ? `<span class="bench-number"> #${p.number}</span>` : ''}</div>
      ${tbLink(p)}
    </div>
  `).join('');

  const opponent  = gameInfo['対戦相手'] || '—';
  const teamColor = TEAM_COLORS[opponent] || '#0B2363';
  const gameDate  = gameInfo['日付']      ? formatDate(gameInfo['日付']) : '—';
  const venue     = gameInfo['球場']      || '';
  const gameTime  = formatTime(gameInfo['試合開始'] || '');

  const venueRow = venue    ? `<div class="game-meta-row"><span class="game-meta-icon">🏟️</span>${venue}</div>` : '';
  const timeRow  = gameTime ? `<div class="game-meta-row"><span class="game-meta-icon">⏰</span>${gameTime} 試合開始</div>` : '';
  const benchSection = bench.length ? `
    <div class="section">
      <div class="section-title">その他の出場選手</div>
      ${benchCards}
    </div>
  ` : '';

  document.getElementById('app').innerHTML = `
    <div class="game-card">
      <div class="game-card-title">TODAY'S GAME</div>
      <div class="game-meta">
        <div class="game-meta-row"><span class="game-meta-icon">📅</span>${gameDate}</div>
        <div class="game-meta-row"><span class="game-meta-icon">⚾</span><span class="game-meta-vs" style="color:${teamColor}">VS ${opponent}</span></div>
        ${venueRow}
        ${timeRow}
      </div>
    </div>

    <div class="section">
      <div class="section-title">スターティングラインナップ</div>
      ${starterCards}${pitcherCard}
    </div>

    ${benchSection}
  `;
}

// ── メイン ───────────────────────────────────────────────────
async function main() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    const { gameInfo, players } = parseData(rows);

    const dateStr   = gameInfo['日付'] || '';
    const hasLineup = players.some(p => p.starter);

    if (!isToday(dateStr) || !hasLineup) {
      renderWaiting();
    } else {
      render(gameInfo, players);
    }
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error-msg">
        ❌ データを読み込めませんでした。<br><br>
        <small style="color:#aaa">エラー詳細: ${e.message}</small>
      </div>
    `;
  }
}

main();
</script>
</body>
</html>
