<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本日のスタメン | オイシックス新潟アルビレックスBC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #F0F2F5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .header {
      background: #0B2363;
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
    }
    .header-team {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .header-accent {
      display: inline-block;
      width: 40px;
      height: 3px;
      background: #E8A800;
      border-radius: 2px;
      margin-top: 10px;
    }

    /* ── 試合情報カード ── */
    .game-card {
      background: white;
      margin: 16px 16px 0;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid #E8A800;
    }
    .game-card-title {
      font-size: 10px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .game-meta {
      display: grid;
      gap: 7px;
    }
    .game-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .game-meta-icon {
      font-size: 16px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .game-meta-vs {
      font-size: 18px;
      font-weight: 800;
    }

    /* ── 待機画面 ── */
    .waiting-card {
      background: white;
      margin: 16px;
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .waiting-emoji { font-size: 52px; margin-bottom: 16px; }
    .waiting-title { font-size: 18px; font-weight: 800; color: #0B2363; margin-bottom: 10px; }
    .waiting-sub   { font-size: 14px; color: #888; line-height: 1.7; }

    /* ── セクション ── */
    .section { margin: 16px 16px 0; }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #0B2363;
      letter-spacing: 0.08em;
      padding: 0 2px 8px;
      border-bottom: 2px solid #0B2363;
      margin-bottom: 10px;
    }

    /* ── Case B スタメンカード ── */
    .player-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      overflow: hidden;
      display: flex;
      align-items: stretch;
      min-height: 108px;
    }
    .player-card.is-pitcher {
      border: 2px dashed #E8A800;
      margin-top: 6px;
    }

    /* 背番号バンド */
    .player-num-band {
      background: #0B2363;
      width: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
    }
    .player-card.is-pitcher .player-num-band {
      background: #4a3a00;
    }
    .player-num-text {
      color: #E8A800;
      font-size: 15px;
      font-weight: 900;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* 顔写真 */
    .player-photo-wrap {
      width: 82px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: #d0d4e0;
    }
    .player-photo {
      width: 100%;
      height: auto;
      display: block;
    }
    .player-photo-placeholder {
      width: 100%;
      min-height: 108px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 800;
      color: #0B2363;
      opacity: 0.35;
      background: #E0E4F0;
    }

    /* 右側コンテンツ */
    .player-card-body {
      flex: 1;
      padding: 10px 12px 10px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      min-width: 0;
    }
    .player-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 1px;
    }
    .player-position-badge {
      background: #0B2363;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .player-number {
      font-size: 11px;
      color: #aaa;
    }
    .player-bio {
      font-size: 11.5px;
      color: #555;
      line-height: 1.55;
      margin-top: 4px;
    }
    .tb-btn {
      display: inline-block;
      margin-top: 6px;
      background: #5B5BD6;
      color: white;
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 5px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      align-self: flex-start;
    }
    .tb-btn:hover { opacity: 0.85; }

    /* ── その他出場選手 ── */
    .bench-card {
      background: white;
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bench-dot { width: 6px; height: 6px; background: #ccc; border-radius: 50%; flex-shrink: 0; }
    .bench-position { font-size: 11px; color: #666; width: 32px; flex-shrink: 0; }
    .bench-name { flex: 1; font-size: 15px; font-weight: 600; }
    .bench-number { font-size: 11px; color: #aaa; font-weight: 400; }

    /* ── TalentBook 説明 ── */
    .tb-note {
      margin: 16px 16px;
      background: #EEF0FF;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }
    .tb-note strong { color: #5B5BD6; }

    /* ── フッター ── */
    .footer { text-align: center; padding: 20px 16px 32px; font-size: 11px; color: #aaa; }

    /* ── ローディング / エラー ── */
    .status-msg { text-align: center; padding: 40px 20px; color: #888; font-size: 14px; }
    .error-msg {
      margin: 16px;
      background: #fff3f3;
      border: 1px solid #fcc;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: #c00;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-team">オイシックス新潟アルビレックスBC</div>
  <div class="header-title">本日のスタメン</div>
  <div class="header-accent"></div>
</div>

<div id="app">
  <div class="status-msg">読み込み中…</div>
</div>

<div class="tb-note">
  <strong>TalentBook（タレントブック）</strong>とは？<br>
  各選手のプロフィール・経歴・インタビューが読めるページです。ぜひ応援したい選手のことをもっと知ってみてください！
</div>

<div class="footer">
  <div>オイシックス新潟アルビレックスBC</div>
</div>

<script>
const CSV_URL = 'https://script.google.com/macros/s/AKfycbwMkya55qhQHBNBxsanR9JuKTjCQ3C6avHqE0YqRh0-jCZcFBTsrwuldi3zV5YT_R7e/exec';

// ── 選手写真マップ（背番号 → Google Drive ファイルID）────────
// ★ 新しい写真を追加するときは Drive のファイルIDをここに追加する
const PHOTO_MAP = {
  '0':  '1JF-67Pf_TLm_rNqiCd5mWQxXxRVVRF85', // 高野
  '5':  '1rmZ4w6PG58mrg-XWbafQWTPUGYCQoUdx', // 大川
  '7':  '1HbMndsiKa6X4XiWNHGNqDirAXy0vWLba', // 園部
  '9':  '1k5niXh0uc9f8Tciu1u__X4MGSimi_TO-', // 髙山
  '24': '1iTXhkoswmN_PT20gor3Hy8RaseJ5gCMo', // 上原
  '25': '1UoW3ezEXBiWyVa2n9-FfA1ovoMSj2sFJ', // 小西
  '35': '1BokonMDXIrGrRZJ81a5JLkIkXxanjWkc', // 中澤
  '42': '1KvSlh-eRTMQY9n1GD0nU9HMmOU1lVZGr', // ウォーカー
  '62': '1NRWgHactge-SqqTyQ91w6kQtMFnePYRg', // 楠田
};
function photoUrl(number) {
  const id = PHOTO_MAP[String(number)];
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : null;
}

// ── 選手紹介文マップ（TalentBook ストーリーID → 一言紹介）──
// ★ TalentBook URL の末尾の数字がストーリーID
const BIO_MAP = {
  '61722': '「ポスト知念」の呼び声高い外野手。思い切りの良さと走攻守のバランスで、2年目はさらなる飛躍を誓う。',
  '61295': '野手では珍しいトミー・ジョン手術を乗り越えたルーキー内野手。毎日の走り込みで磨いた俊足を武器に首位打者を狙う。',
  '61530': '独立リーグ・NPBを経てオイシックス3年目。パンチ力ある打撃と全ポジション平均以上の総合力でキャリアハイを狙う。',
  '61471': '広角に長打を打てる大型外野手。「脱力打法」を習得し、今季は二桁本塁打と打点でチームの勝利に貢献する。',
  '61446': '聖光学院出身の先発右腕。最速148kmのストレートとスライダーを武器に、「仲間のために投げる」ことを誓う2年目。',
  '61487': 'ルーキーながら捕手最多71試合出場を果たした頼れる司令塔。投手とのコミュニケーション力と勝負強い打撃も光る。',
  '61425': '内外野を幅広くこなすユーティリティルーキー。ミート力と頭から突っ込む熱いプレーで1年目のスタメン獲得を狙う。',
};
function bioText(tbUrl) {
  if (!tbUrl) return '';
  const m = tbUrl.match(/\/stories\/(\d+)/);
  return m ? (BIO_MAP[m[1]] || '') : '';
}

// ── チームカラー ─────────────────────────────────────────────
const TEAM_COLORS = {
  '東北楽天ゴールデンイーグルス': '#CC0033',
  '読売ジャイアンツ':             '#F47920',
  '東京ヤクルトスワローズ':       '#007B40',
  '横浜DeNAベイスターズ':        '#004B98',
  '埼玉西武ライオンズ':           '#00358C',
  '北海道日本ハムファイターズ':   '#E60012',
  'オリックス・バファローズ':     '#1A2F6B',
  '千葉ロッテマリーンズ':         '#002B56',
  '福岡ソフトバンクホークス':     '#F7B027',
  '中日ドラゴンズ':               '#003595',
  '阪神タイガース':               '#FFE000',
  '広島東洋カープ':               '#E40012',
};

// ── CSV パーサー ────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const cells = [];
    let inQuote = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cell += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cells.push(cell.trim()); cell = '';
      } else {
        cell += ch;
      }
    }
    cells.push(cell.trim());
    rows.push(cells);
  }
  return rows;
}

// ── データ解析 ───────────────────────────────────────────────
function parseData(rows) {
  let lineupHeaderRow = -1;
  for (let i = 0; i < rows.length; i++) {
    if ((rows[i][0] || '').trim() === '打順') { lineupHeaderRow = i; break; }
  }

  const gameInfo = {};
  for (let i = 0; i < (lineupHeaderRow < 0 ? rows.length : lineupHeaderRow); i++) {
    const row = rows[i];
    const key = (row[0] || '').trim();
    if (!key) continue;
    const value = row.slice(1).map(c => c.trim()).find(c => c) || '';
    gameInfo[key] = value;
  }

  const players = [];
  if (lineupHeaderRow >= 0) {
    for (let i = lineupHeaderRow + 1; i < rows.length; i++) {
      const row = rows[i];
      const order = (row[0] || '').trim();
      const name  = (row[3] || '').trim();
      if (!name || name.startsWith('#')) continue;
      players.push({
        order,
        pos:     (row[1] || '').trim(),
        number:  (row[2] || '').trim(),
        name,
        starter: /^\d+$/.test(order) || order === 'P',
        pitcher: order === 'P',
        tbUrl:   (row[4] || '').trim().startsWith('http') ? (row[4] || '').trim() : ''
      });
    }
  }

  return { gameInfo, players };
}

// ── 今日かどうか判定 ─────────────────────────────────────────
function isToday(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) {
    return parseInt(m[1]) === today.getFullYear() &&
           parseInt(m[2]) === today.getMonth() + 1 &&
           parseInt(m[3]) === today.getDate();
  }
  const d = new Date(dateStr);
  if (!isNaN(d)) {
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth()    === today.getMonth() &&
           d.getDate()     === today.getDate();
  }
  return false;
}

// ── 時刻フォーマット ─────────────────────────────────────────
function formatTime(val) {
  if (!val) return '';
  if (/^\d{1,2}:\d{2}$/.test(val)) return val;
  const d = new Date(val);
  if (!isNaN(d)) {
    return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
  }
  const num = parseFloat(val);
  if (!isNaN(num) && num > 0 && num < 1) {
    const totalMin = Math.round(num * 24 * 60);
    return `${Math.floor(totalMin / 60)}:${(totalMin % 60).toString().padStart(2, '0')}`;
  }
  return val;
}

// ── 日付フォーマット ─────────────────────────────────────────
function formatDate(str) {
  if (/\d{4}年\d{1,2}月\d{1,2}日/.test(str)) return str;
  const d = new Date(str.replace(/\//g, '-'));
  if (isNaN(d)) return str;
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

// ── 待機画面 ─────────────────────────────────────────────────
function renderWaiting() {
  document.getElementById('app').innerHTML = `
    <div class="waiting-card">
      <div class="waiting-emoji">⚾</div>
      <div class="waiting-title">スタメン発表まであと少し！</div>
      <div class="waiting-sub">楽しみに待っててね！<br>発表されたらこのページを更新してみてください。</div>
    </div>
  `;
}

// ── 選手カード描画ヘルパー ───────────────────────────────────
function buildPlayerCard(p, orderLabel, isPitcher) {
  const url     = photoUrl(p.number);
  const initial = p.name.trim().slice(0, 1);
  const bio     = bioText(p.tbUrl);

  const photoHtml = url
    ? `<img class="player-photo" src="${url}" alt="${p.name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="player-photo-placeholder" style="display:none">${initial}</div>`
    : `<div class="player-photo-placeholder">${initial}</div>`;

  const tbHtml = p.tbUrl
    ? `<a class="tb-btn" href="${p.tbUrl}" target="_blank" rel="noopener">プロフィール ›</a>`
    : '';

  const bioHtml = bio ? `<div class="player-bio">${bio}</div>` : '';

  return `
    <div class="player-card${isPitcher ? ' is-pitcher' : ''}">
      <div class="player-num-band">
        <div class="player-num-text">${orderLabel}</div>
      </div>
      <div class="player-photo-wrap">${photoHtml}</div>
      <div class="player-card-body">
        <div class="player-name">${p.name}</div>
        <div class="player-meta">
          <span class="player-position-badge">${p.pos}</span>
          ${p.number ? `<span class="player-number">#${p.number}</span>` : ''}
        </div>
        ${bioHtml}
        ${tbHtml}
      </div>
    </div>
  `;
}

// ── 描画 ─────────────────────────────────────────────────────
function render(gameInfo, players) {
  const starters = players.filter(p => p.starter && !p.pitcher);
  const pitcher  = players.find(p => p.pitcher);
  const bench    = players.filter(p => !p.starter);

  const starterCards = starters.map(p =>
    buildPlayerCard(p, p.order, false)
  ).join('');

  const pitcherCard = pitcher
    ? buildPlayerCard(pitcher, '投手', true)
    : '';

  const benchCards = bench.map(p => {
    const tbHtml = p.tbUrl
      ? `<a class="tb-btn" href="${p.tbUrl}" target="_blank" rel="noopener">プロフィール ›</a>`
      : '';
    return `
      <div class="bench-card">
        <div class="bench-dot"></div>
        <div class="bench-position">${p.pos}</div>
        <div class="bench-name">${p.name}${p.number ? `<span class="bench-number"> #${p.number}</span>` : ''}</div>
        ${tbHtml}
      </div>
    `;
  }).join('');

  const opponent  = gameInfo['対戦相手'] || '—';
  const teamColor = TEAM_COLORS[opponent] || '#0B2363';
  const gameDate  = gameInfo['日付']      ? formatDate(gameInfo['日付']) : '—';
  const venue     = gameInfo['球場']      || '';
  const gameTime  = formatTime(gameInfo['試合開始'] || '');

  const venueRow = venue    ? `<div class="game-meta-row"><span class="game-meta-icon">🏟️</span>${venue}</div>` : '';
  const timeRow  = gameTime ? `<div class="game-meta-row"><span class="game-meta-icon">⏰</span>${gameTime} 試合開始</div>` : '';
  const benchSection = bench.length ? `
    <div class="section">
      <div class="section-title">その他の出場選手</div>
      ${benchCards}
    </div>
  ` : '';

  document.getElementById('app').innerHTML = `
    <div class="game-card">
      <div class="game-card-title">TODAY'S GAME</div>
      <div class="game-meta">
        <div class="game-meta-row"><span class="game-meta-icon">📅</span>${gameDate}</div>
        <div class="game-meta-row"><span class="game-meta-icon">⚾</span><span class="game-meta-vs" style="color:${teamColor}">VS ${opponent}</span></div>
        ${venueRow}
        ${timeRow}
      </div>
    </div>

    <div class="section">
      <div class="section-title">スターティングラインナップ</div>
      ${starterCards}${pitcherCard}
    </div>

    ${benchSection}
  `;
}

// ── メイン ───────────────────────────────────────────────────
async function main() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    const { gameInfo, players } = parseData(rows);

    const dateStr   = gameInfo['日付'] || '';
    const hasLineup = players.some(p => p.starter);

    if (!isToday(dateStr) || !hasLineup) {
      renderWaiting();
    } else {
      render(gameInfo, players);
    }
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error-msg">
        ❌ データを読み込めませんでした。<br><br>
        <small style="color:#aaa">エラー詳細: ${e.message}</small>
      </div>
    `;
  }
}

main();
</script>
</body>
</html>
